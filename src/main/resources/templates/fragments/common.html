<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head th:fragment="head(pageTitle, pageCss)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">GPLX Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/uicons-regular-rounded/css/uicons-regular-rounded.css">
    <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/uicons-solid-rounded/css/uicons-solid-rounded.css">
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <link rel="stylesheet" th:if="${pageCss != null and !#strings.isEmpty(pageCss)}" th:href="@{${pageCss}}">
</head>

<body>
    <aside th:fragment="sidebar(activePage)" class="app-sidebar" id="appSidebar">
        <div class="sidebar-brand">
            <i class="bi bi-grid-1x2-fill me-2"></i><span class="sidebar-brand-text">GPLX Management</span>
        </div>
        <nav class="nav nav-pills flex-column pt-2">
            <a class="nav-link" th:classappend="${activePage == 'home'} ? ' active' : ''" th:href="@{/}">
                <i class="bi bi-house-door"></i><span class="link-text">Trang chủ</span>
            </a>

            <div class="sidebar-group-title">Công dân</div>
            <a class="nav-link" th:classappend="${activePage == 'citizens.form'} ? ' active' : ''"
                th:href="@{/profiles/citizens}">
                <i class="bi bi-people"></i><span class="link-text">Công dân</span>
            </a>
            <a class="nav-link" th:classappend="${activePage == 'citizens.stats'} ? ' active' : ''"
                th:href="@{/profiles/citizens/statistics}">
                <i class="bi bi-bar-chart"></i><span class="link-text">Thống kê</span>
            </a>

            <div class="sidebar-group-title">Hồ sơ</div>
            <a class="nav-link"
                th:classappend="${activePage == 'applications.list' || activePage == 'applications.form'} ? ' active' : ''"
                th:href="@{/profiles/applications}">
                <i class="bi bi-folder2-open"></i><span class="link-text">Hồ sơ</span>
            </a>
            <a class="nav-link" th:classappend="${activePage == 'applications.approval'} ? ' active' : ''"
                th:href="@{/profiles/applications/approval}">
                <i class="bi bi-check2-square"></i><span class="link-text">Xét duyệt</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <button id="sidebarCollapse" type="button" class="btn btn-outline-light btn-sm w-100">
                <i class="bi bi-layout-sidebar-inset"></i><span class="sidebar-footer-text ms-1">Thu gọn</span>
            </button>
        </div>
    </aside>

    <nav th:fragment="topbar(toolbarTitle)" class="navbar top-toolbar px-3">
        <div class="d-flex align-items-center gap-2">
            <button id="sidebarToggle" class="btn btn-outline-secondary btn-sm" type="button"><i
                    class="bi bi-list"></i></button>
            <span class="navbar-brand mb-0 h1 fs-5" th:text="${toolbarTitle}">GPLX</span>
        </div>
        <button id="themeToggle" class="btn btn-outline-secondary btn-sm" type="button"></button>
    </nav>

    <footer th:fragment="footer" class="app-footer px-3 py-2">
        <span>GPLX Management</span>
        <span class="text-secondary">He thong quan ly cong dan va ho so GPLX</span>
    </footer>

    <th:block th:fragment="scripts(pageJs)">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script th:src="@{/js/app-shell.js}"></script>
        <script th:if="${pageJs != null and !#strings.isEmpty(pageJs)}" th:src="@{${pageJs}}"></script>
    </th:block>
</body>

</html>
