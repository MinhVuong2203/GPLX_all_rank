<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/common :: head('Quan ly Ho so thi', '/css/profiles/applications/list.css')}"></head>

<body>
    <div class="app-shell">
        <aside th:replace="~{fragments/common :: sidebar('applications.list')}"></aside>

        <div class="app-main">
            <nav th:replace="~{fragments/common :: topbar('Quan ly ho so')}"></nav>

            <main class="content-wrap">
                <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                    <h1 class="h4 mb-0">Danh sách hồ sơ thi</h1>
                    <div class="d-flex gap-2">
                        <a class="btn btn-primary btn-sm" th:href="@{/profiles/applications/new}"><i
                                class="bi bi-plus-circle me-1"></i>Thêm hồ sơ</a>
                        <a class="btn btn-outline-primary btn-sm" th:href="@{/profiles/applications/approval}">Trang xét
                            duyệt</a>
                    </div>
                </div>

                <section class="card p-3">
                    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
                    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

                    <div class="table-wrap">
                        <table class="table table-striped table-hover align-middle">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Public ID</th>
                                    <th>Công dân</th>
                                    <th>Hạng</th>
                                    <th>Ngày nộp</th>
                                    <th>Trạng thái</th>
                                    <th>Thanh toán</th>
                                    <th>Thao tác</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:if="${applicationPage.content.isEmpty()}">
                                    <td colspan="8" class="text-center text-muted">Không có dữ liệu hồ sơ.</td>
                                </tr>
                                <tr th:each="a : ${applicationPage.content}">
                                    <td th:text="${a.id}"></td>
                                    <td th:text="${a.publicId}"></td>
                                    <td
                                        th:text="${a.maCongDan != null ? a.maCongDan.hoTen + ' (' + a.maCongDan.cccd + ')' : '-'}">
                                    </td>
                                    <td th:text="${a.maHang != null ? a.maHang.maHang : '-'}"></td>
                                    <td
                                        th:text="${a.ngayNop != null ? #temporals.format(a.ngayNop, 'yyyy-MM-dd HH:mm') : '-'}">
                                    </td>
                                    <td><span class="badge text-bg-secondary" th:text="${a.trangThai}"></span></td>
                                    <td
                                        th:text="${a.trangThaiThanhToan != null && a.trangThaiThanhToan ? 'Đã thanh toán' : 'Chưa thanh toán'}">
                                    </td>
                                    <td>
                                        <div class="d-flex flex-wrap gap-1">
                                            <a class="btn btn-outline-secondary btn-sm"
                                                th:href="@{/profiles/applications/{id}/edit(id=${a.id})}">Sửa</a>
                                            <a class="btn btn-outline-primary btn-sm"
                                                th:href="@{/profiles/applications/approval(selectedId=${a.id})}">Xét
                                                duyệt</a>
                                            <form th:action="@{/profiles/applications/{id}/delete(id=${a.id})}"
                                                method="post"
                                                onsubmit="return confirm('Bạn có chắc chắn muốn xóa hồ sơ này?');">
                                                <button type="submit" class="btn btn-outline-danger btn-sm">Xóa</button>
                                            </form>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mt-3"
                        th:if="${applicationPage.totalPages > 1}">
                        <a class="btn btn-outline-secondary btn-sm" th:if="${!applicationPage.first}"
                            th:href="@{/profiles/applications(page=${currentPage - 1},size=${pageSize})}">Trước</a>
                        <span class="text-muted">Trang <strong th:text="${currentPage + 1}"></strong> / <strong
                                th:text="${applicationPage.totalPages}"></strong></span>
                        <a class="btn btn-outline-secondary btn-sm" th:if="${!applicationPage.last}"
                            th:href="@{/profiles/applications(page=${currentPage + 1},size=${pageSize})}">Sau</a>
                    </div>
                </section>
            </main>
            <footer th:replace="~{fragments/common :: footer}"></footer>
        </div>
    </div>

    <th:block th:replace="~{fragments/common :: scripts('/js/profiles/applications/list.js')}"></th:block>
</body>

</html>
