<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/common :: head('Thong ke Cong dan', '/css/profiles/citizens/list.css')}"></head>

<body>
    <div class="app-shell">
        <aside th:replace="~{fragments/common :: sidebar('citizens.stats')}"></aside>

        <div class="app-main">
            <nav th:replace="~{fragments/common :: topbar('Thong ke cong dan')}"></nav>

            <main class="content-wrap">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h1 class="h4 mb-0">Trang thống kê Công dân</h1>
                    <a class="btn btn-outline-primary btn-sm" th:href="@{/profiles/citizens}">Về trang Công dân</a>
                </div>

                <section class="card p-3 mb-3">
                    <form class="row g-2 align-items-end mb-3" th:action="@{/profiles/citizens/statistics}"
                        method="get">
                        <div class="col-md-2">
                            <label class="form-label">CCCD</label>
                            <input class="form-control" type="text" name="cccd" th:value="${criteria.cccd}">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Họ tên</label>
                            <input class="form-control" type="text" name="hoTen" th:value="${criteria.hoTen}">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Từ ngày</label>
                            <input class="form-control" type="date" name="createdFrom"
                                th:value="${criteria.createdFrom}">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Đến ngày</label>
                            <input class="form-control" type="date" name="createdTo" th:value="${criteria.createdTo}">
                        </div>
                        <div class="col-md-auto">
                            <button type="submit" class="btn btn-primary btn-sm">Lọc thống kê</button>
                        </div>
                        <div class="col-md-auto">
                            <a class="btn btn-outline-secondary btn-sm" th:href="@{/profiles/citizens/statistics}">Đặt
                                lại</a>
                        </div>
                    </form>

                    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
                    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

                    <div class="table-wrap">
                        <table class="table table-striped table-hover align-middle">
                            <thead>
                                <tr>
                                    <th></th>
                                    <th>Họ tên</th>
                                    <th>CCCD</th>
                                    <th>Số điện thoại</th>
                                    <th>Email</th>
                                    <th>Ngày tạo</th>
                                    <th>Sức khỏe</th>
                                    <th>Thao tác</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:if="${citizenPage.content.isEmpty()}">
                                    <td colspan="10" class="text-center text-secondary">Không có dữ liệu công dân.</td>
                                </tr>
                                <tr th:each="c : ${citizenPage.content}">

                                    <td>
                                        <img th:if="${c.anh3x4}" th:src="@{'/' + ${c.anh3x4}}" alt="Ảnh công dân"
                                            class="avatar-sm">
                                        <span th:unless="${c.anh3x4}">-</span>
                                    </td>
                                    <td th:text="${c.hoTen}"></td>
                                    <td th:text="${c.cccd}"></td>
                                    <td th:text="${c.soDienThoai}"></td>
                                    <td th:text="${c.email}"></td>
                                    <td
                                        th:text="${c.ngayTao != null ? #temporals.format(c.ngayTao, 'yyyy-MM-dd HH:mm') : '-'}">
                                    </td>
                                    <td th:text="${c.tinhTrangSucKhoe}"></td>
                                    <td>
                                        <div class="d-flex flex-wrap gap-2">
                                            <a class="btn btn-outline-primary btn-sm"
                                                th:href="@{/profiles/citizens(cccd=${c.cccd})}">Sửa</a>
                                            <form th:action="@{/profiles/citizens/{id}/delete(id=${c.id})}"
                                                method="post"
                                                onsubmit="return confirm('Bạn có chắc chắn muốn xóa công dân này?');">
                                                <button type="submit" class="btn btn-outline-danger btn-sm">Xóa</button>
                                            </form>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="d-flex gap-2 align-items-center" th:if="${citizenPage.totalPages > 1}">
                        <a class="btn btn-outline-secondary btn-sm" th:if="${!citizenPage.first}"
                            th:href="@{/profiles/citizens/statistics(page=${currentPage - 1},size=${pageSize},cccd=${criteria.cccd},hoTen=${criteria.hoTen},createdFrom=${criteria.createdFrom},createdTo=${criteria.createdTo})}">Trước</a>
                        <span>Trang <strong th:text="${currentPage + 1}"></strong> / <strong
                                th:text="${citizenPage.totalPages}"></strong></span>
                        <a class="btn btn-outline-secondary btn-sm" th:if="${!citizenPage.last}"
                            th:href="@{/profiles/citizens/statistics(page=${currentPage + 1},size=${pageSize},cccd=${criteria.cccd},hoTen=${criteria.hoTen},createdFrom=${criteria.createdFrom},createdTo=${criteria.createdTo})}">Sau</a>
                    </div>
                </section>

                <section class="card p-3">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h2 class="h5 mb-0">Công dân mới trong ngày</h2>
                        <a class="btn btn-outline-primary btn-sm" th:href="@{/profiles/citizens/today}">Xem trang
                            riêng</a>
                    </div>
                    <div class="table-wrap">
                        <table class="table table-striped align-middle">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Họ tên</th>
                                    <th>CCCD</th>
                                    <th>Ngày tạo</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:if="${todayCitizens.isEmpty()}">
                                    <td colspan="4" class="text-center text-secondary">Không có công dân mới trong ngày.
                                    </td>
                                </tr>
                                <tr th:each="c : ${todayCitizens}">
                                    <td th:text="${c.id}"></td>
                                    <td th:text="${c.hoTen}"></td>
                                    <td th:text="${c.cccd}"></td>
                                    <td
                                        th:text="${c.ngayTao != null ? #temporals.format(c.ngayTao, 'yyyy-MM-dd HH:mm') : '-'}">
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </section>
            </main>
            <footer th:replace="~{fragments/common :: footer}"></footer>
        </div>
    </div>

    <th:block th:replace="~{fragments/common :: scripts('/js/profiles/citizens/list.js')}"></th:block>
</body>

</html>
