<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/common :: head('Cong dan moi hom nay', '/css/profiles/citizens/today.css')}"></head>

<body>
    <div class="app-shell">
        <aside th:replace="~{fragments/common :: sidebar('citizens.stats')}"></aside>

        <div class="app-main">
            <nav th:replace="~{fragments/common :: topbar('Cong dan moi trong ngay')}"></nav>

            <main class="content-wrap">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h1 class="h4 mb-0">Danh sách công dân mới trong ngày</h1>
                    <a class="btn btn-outline-primary btn-sm" th:href="@{/profiles/citizens}">Quay lại trang Công
                        dân</a>
                </div>

                <section class="card">
                    <div class="table-wrap">
                        <table class="table table-striped table-hover align-middle">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Họ tên</th>
                                    <th>CCCD</th>
                                    <th>Số điện thoại</th>
                                    <th>Ngày tạo</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:if="${todayCitizens.isEmpty()}">
                                    <td colspan="5" class="text-center text-secondary">Không có công dân mới trong ngày.
                                    </td>
                                </tr>
                                <tr th:each="c : ${todayCitizens}">
                                    <td th:text="${c.id}"></td>
                                    <td th:text="${c.hoTen}"></td>
                                    <td th:text="${c.cccd}"></td>
                                    <td th:text="${c.soDienThoai}"></td>
                                    <td
                                        th:text="${c.ngayTao != null ? #temporals.format(c.ngayTao, 'yyyy-MM-dd HH:mm') : '-'}">
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </section>
            </main>
            <footer th:replace="~{fragments/common :: footer}"></footer>
        </div>
    </div>

    <th:block th:replace="~{fragments/common :: scripts('/js/profiles/citizens/today.js')}"></th:block>
</body>

</html>
